# .github/workflows/static.yml
# Deploys the /dashboard folder to GitHub Pages
# Injects SUPABASE_URL and SUPABASE_ANON_KEY into stats.js at build time

name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase credentials into stats.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          sed -i "s|'https://YOUR_PROJECT_REF.supabase.co'|'${SUPABASE_URL}'|g" dashboard/js/stats.js
          sed -i "s|'YOUR_ANON_KEY_HERE'|'${SUPABASE_ANON_KEY}'|g" dashboard/js/stats.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dashboard"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
