# =============================================================================
# daily_simulation.yml — Baseline MLB
# Monte Carlo game simulation pipeline
#
# Schedule: Every day at 10:00 AM ET (14:00 UTC during EDT / 15:00 UTC during EST)
# Before lineups lock — fetches confirmed lineups, weather, runs sims,
# uploads to Supabase, and triggers a Vercel frontend redeployment.
# =============================================================================

name: Daily Simulation

on:
  schedule:
    # 10:00 AM ET = 14:00 UTC (EDT, Mar-Nov) / 15:00 UTC (EST, Nov-Mar)
    # Using 14:00 UTC to cover the MLB season (April-October = EDT)
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      game_date:
        description: "Override game date (YYYY-MM-DD). Defaults to today."
        required: false
        type: string
      num_sims:
        description: "Number of Monte Carlo iterations (default: 10000)"
        required: false
        default: "10000"
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
  VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
  PYTHONPATH: ${{ github.workspace }}

concurrency:
  group: daily-simulation
  cancel-in-progress: true

jobs:
  simulate:
    name: "Monte Carlo Simulation"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install numpy scipy requests

      - name: Fetch confirmed lineups
        id: lineups
        run: |
          python pipeline/fetch_games.py
          python pipeline/fetch_players.py

      - name: Fetch weather data for outdoor venues
        run: |
          python -c "
          import json, requests, os
          from datetime import date

          VENUE_COORDS = {
              'Yankee Stadium': (40.8296, -73.9262),
              'Fenway Park': (42.3467, -71.0972),
              'Wrigley Field': (41.9484, -87.6553),
              'Dodger Stadium': (34.0739, -118.2400),
              'Oracle Park': (37.7786, -122.3893),
              'Coors Field': (39.7559, -104.9942),
              'Kauffman Stadium': (39.0517, -94.4803),
              'PNC Park': (40.4469, -80.0058),
              'Nationals Park': (38.8730, -77.0074),
              'Citizens Bank Park': (39.9061, -75.1665),
              'Citi Field': (40.7571, -73.8458),
              'Busch Stadium': (38.6226, -90.1928),
              'Great American Ball Park': (39.0974, -84.5069),
              'Progressive Field': (41.4962, -81.6852),
              'Comerica Park': (42.3390, -83.0485),
              'Target Field': (44.9818, -93.2775),
              'Angel Stadium': (33.8003, -117.8827),
              'T-Mobile Park': (47.5914, -122.3325),
              'Petco Park': (32.7076, -117.1570),
          }

          weather_data = {}
          for venue, (lat, lon) in VENUE_COORDS.items():
              try:
                  url = f'https://api.open-meteo.com/v1/forecast?latitude={lat}&longitude={lon}&hourly=temperature_2m,windspeed_10m,winddirection_10m,precipitation_probability&timezone=America/New_York&forecast_days=1'
                  resp = requests.get(url, timeout=10)
                  resp.raise_for_status()
                  wx = resp.json().get('hourly', {})
                  idx = min(19, len(wx.get('temperature_2m', [])) - 1)
                  weather_data[venue] = {
                      'temp_f': round(wx['temperature_2m'][idx] * 9/5 + 32, 1) if wx.get('temperature_2m') else None,
                      'wind_mph': round(wx['windspeed_10m'][idx] * 0.621, 1) if wx.get('windspeed_10m') else None,
                      'wind_dir': wx['winddirection_10m'][idx] if wx.get('winddirection_10m') else None,
                      'precip_pct': wx['precipitation_probability'][idx] if wx.get('precipitation_probability') else None,
                  }
              except Exception as e:
                  print(f'Weather fetch failed for {venue}: {e}')

          os.makedirs('data', exist_ok=True)
          with open('data/today_weather.json', 'w') as f:
              json.dump(weather_data, f, indent=2)
          print(f'Fetched weather for {len(weather_data)} venues')
          "

      - name: Generate projections
        run: |
          python pipeline/generate_projections.py
          python pipeline/generate_batter_projections.py

      - name: Run Monte Carlo simulations
        run: |
          NUM_SIMS="${{ inputs.num_sims || '10000' }}"
          python -c "
          import json, os, sys
          import numpy as np
          import requests
          from datetime import date

          NUM_SIMS = int(os.environ.get('NUM_SIMS', '${NUM_SIMS}').strip() or '10000')
          print(f'Running {NUM_SIMS} Monte Carlo iterations per game...')

          sb_url = os.environ['SUPABASE_URL']
          sb_key = os.environ['SUPABASE_SERVICE_KEY']
          headers = {
              'apikey': sb_key,
              'Authorization': f'Bearer {sb_key}',
              'Content-Type': 'application/json',
          }

          game_date = date.today().isoformat()
          resp = requests.get(
              f'{sb_url}/rest/v1/projections',
              headers=headers,
              params={'game_date': f'eq.{game_date}', 'select': '*'}
          )
          projections = resp.json() if resp.ok else []

          resp2 = requests.get(
              f'{sb_url}/rest/v1/games',
              headers=headers,
              params={'game_date': f'eq.{game_date}', 'select': '*'}
          )
          games = resp2.json() if resp2.ok else []

          weather = {}
          if os.path.exists('data/today_weather.json'):
              with open('data/today_weather.json') as f:
                  weather = json.load(f)

          proj_by_id = {}
          for p in projections:
              pid = p.get('mlbam_id')
              if pid:
                  proj_by_id[int(pid)] = p

          def wind_k_adj(wind_mph, wind_dir):
              if wind_mph is None or wind_dir is None: return 1.0
              if 135 <= wind_dir <= 225: return 1.0 + (wind_mph * 0.002)
              elif wind_dir <= 45 or wind_dir >= 315: return 1.0 - (wind_mph * 0.001)
              return 1.0

          def temp_k_adj(temp_f):
              if temp_f is None: return 1.0
              if temp_f < 55: return 1.02
              elif temp_f > 85: return 0.98
              return 1.0

          results = []
          for game in games:
              game_pk = game.get('game_pk')
              venue = game.get('venue', '')
              wx = weather.get(venue, {})

              for pid_key, pname_key in [
                  ('home_probable_pitcher_id', 'home_probable_pitcher'),
                  ('away_probable_pitcher_id', 'away_probable_pitcher'),
              ]:
                  pid = game.get(pid_key)
                  pname = game.get(pname_key)
                  if not pid or not pname: continue

                  proj = proj_by_id.get(int(pid), {})
                  mean_k = float(proj.get('projection', 5.5))
                  confidence = float(proj.get('confidence', 0.5))

                  wind_adj = wind_k_adj(wx.get('wind_mph'), wx.get('wind_dir'))
                  temp_adj = temp_k_adj(wx.get('temp_f'))
                  adj_mean = max(mean_k * wind_adj * temp_adj, 0.5)

                  samples = np.random.poisson(lam=adj_mean, size=NUM_SIMS)

                  sim = {
                      'game_pk': game_pk,
                      'game_date': game_date,
                      'mlbam_id': pid,
                      'player_name': pname,
                      'stat_type': 'pitcher_strikeouts',
                      'sim_mean': round(float(np.mean(samples)), 2),
                      'sim_median': int(np.median(samples)),
                      'sim_std': round(float(np.std(samples)), 2),
                      'sim_p10': int(np.percentile(samples, 10)),
                      'sim_p25': int(np.percentile(samples, 25)),
                      'sim_p75': int(np.percentile(samples, 75)),
                      'sim_p90': int(np.percentile(samples, 90)),
                      'over_5_5_pct': round(float(np.mean(samples > 5.5)) * 100, 1),
                      'over_6_5_pct': round(float(np.mean(samples > 6.5)) * 100, 1),
                      'over_7_5_pct': round(float(np.mean(samples > 7.5)) * 100, 1),
                      'projection_mean': mean_k,
                      'confidence': confidence,
                      'num_sims': NUM_SIMS,
                      'weather': json.dumps(wx) if wx else None,
                  }
                  results.append(sim)
                  print(f'  {pname}: mean={sim["sim_mean"]}, P(>5.5)={sim["over_5_5_pct"]}%')

          os.makedirs('data', exist_ok=True)
          with open('data/simulation_results.json', 'w') as f:
              json.dump(results, f, indent=2, default=str)
          print(f'Completed {len(results)} pitcher simulations')
          "

      - name: Upload simulation results to Supabase
        run: |
          python -c "
          import json, os, requests
          from datetime import datetime

          sb_url = os.environ['SUPABASE_URL']
          sb_key = os.environ['SUPABASE_SERVICE_KEY']
          headers = {
              'apikey': sb_key,
              'Authorization': f'Bearer {sb_key}',
              'Content-Type': 'application/json',
              'Prefer': 'resolution=merge-duplicates',
          }

          with open('data/simulation_results.json') as f:
              results = json.load(f)

          for r in results:
              r['computed_at'] = datetime.utcnow().isoformat()

          endpoint = f'{sb_url}/rest/v1/simulation_results'
          for i in range(0, len(results), 500):
              batch = results[i:i+500]
              resp = requests.post(endpoint, headers=headers, json=batch)
              if resp.ok:
                  print(f'Upserted batch {i//500 + 1}: {len(batch)} rows')
              else:
                  print(f'Upsert error: {resp.status_code} - {resp.text[:200]}')

          print(f'Uploaded {len(results)} simulation results to Supabase')
          "

      - name: Trigger Vercel redeploy
        if: env.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -s -X POST "$VERCEL_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d '{}' \
            && echo "Vercel redeploy triggered" \
            || echo "Vercel redeploy failed (non-critical)"

      - name: Upload simulation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-data-${{ github.run_id }}
          path: data/
          retention-days: 7
