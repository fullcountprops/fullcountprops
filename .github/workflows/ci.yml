# =============================================================================
# ci.yml — FullCountProps
# Continuous Integration: runs on every pull request
#
# Checks: Python lint (Ruff), Pytest, Next.js build, migration validation
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  SUPABASE_URL: "https://test-project.supabase.co"
  SUPABASE_SERVICE_KEY: "test-key-ci-only"
  ODDS_API_KEY: "test-key-ci-only"
  PYTHONPATH: ${{ github.workspace }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: "Lint Python (Ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Run Ruff linter
        run: |
          ruff check pipeline/ scripts/ lib/ tests/ models/ simulator/ \
            --select E,F,W,I \
            --ignore E501,E402,I001 \
            --output-format github
      - name: Run Ruff formatter check
        run: ruff format --check pipeline/ scripts/ lib/ tests/ models/ simulator/ || true

  test-python:
    name: "Test Python (Pytest)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            -v --tb=short \
            --cov=pipeline --cov=lib \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
          retention-days: 7

  build-frontend:
    name: "Build Frontend (Next.js)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - run: npm ci || npm install
      - run: npm run lint || true
      - name: TypeScript type check
        run: npx tsc --noEmit || true
      - name: Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://test-project.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key-ci-only"
        run: npm run build

  validate-migrations:
    name: "Validate Supabase Migrations"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate SQL migration files
        run: |
          echo "=== Validating Supabase migrations ==="
          MIGRATION_DIR="supabase/migrations"
          SCHEMA_FILE="supabase/schema.sql"

          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "Warning: No migrations directory found"
          else
            echo "Found migration files:"
            ls -la "$MIGRATION_DIR"/*.sql 2>/dev/null || echo "  (none)"
            for f in "$MIGRATION_DIR"/*.sql; do
              [ -f "$f" ] || continue
              echo "  Checking $f..."
              if grep -qiE "DROP TABLE|DROP SCHEMA|TRUNCATE" "$f"; then
                echo "    WARNING: Destructive operation found in $f"
              fi
              if [ ! -s "$f" ]; then
                echo "    ERROR: Empty migration file $f"
                exit 1
              fi
              OPEN=$(grep -o "(" "$f" | wc -l)
              CLOSE=$(grep -o ")" "$f" | wc -l)
              if [ "$OPEN" -ne "$CLOSE" ]; then
                echo "    WARNING: Unbalanced parentheses in $f"
              fi
              echo "    OK: $f"
            done
          fi

          if [ -f "$SCHEMA_FILE" ]; then
            echo ""
            TABLE_COUNT=$(grep -c "CREATE TABLE" "$SCHEMA_FILE" || true)
            INDEX_COUNT=$(grep -c "CREATE INDEX" "$SCHEMA_FILE" || true)
            echo "Master schema: $TABLE_COUNT tables, $INDEX_COUNT indexes"
          fi
          echo "=== Migration validation complete ==="
