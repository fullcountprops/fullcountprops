# .github/workflows/pipelines.yml
# Automated daily MLB data pipelines for Baseline MLB
#
# v3.0 Changes (Cycle #4):
#   - Merged morning_data_refresh.yml into this workflow (was a duplicate)
#   - Added rolling stats computation (extracted from inline Python)
#   - Added umpire framing to overnight pipeline
#   - All Statcast references point to pipeline/fetch_statcast.py
#
# Schedule (all times ET during EDT):
#   07:00 — Pre-market data refresh: Statcast, umpire framing, rolling stats
#   08:00 — Morning: fetch schedule + rosters
#   10:30 — Late morning: lineups + weather + props + projections
#   16:30 — Afternoon: props refresh + updated projections + lineups + weather
#   02:00 — Overnight: grade accuracy + CLV tracking
#   Sun 03:00 — Weekly: Statcast historical refresh + training data build
name: MLB Data Pipelines
on:
  schedule:
    # Pre-market refresh: 7:00 AM ET = 11:00 UTC (EDT) / 12:00 UTC (EST)
    - cron: "0 11 * * *"
    # Morning: 8:00 AM ET = 12:00 UTC (EDT)
    - cron: "0 12 * * *"
    # Late morning: 10:30 AM ET = 14:30 UTC
    - cron: "30 14 * * *"
    # Afternoon: 4:30 PM ET = 20:30 UTC
    - cron: "30 20 * * *"
    # Overnight: 2:00 AM ET = 06:00 UTC
    - cron: "0 6 * * *"
    # Weekly: Statcast historical refresh (Sunday 3:00 AM ET = 07:00 UTC)
    - cron: "0 7 * * 0"
  workflow_dispatch:
env:
  SUPABASE_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
  PYTHONPATH: ${{ github.workspace }}
jobs:
  # -- Pre-Market Refresh: Statcast + Umpire Framing + Rolling Stats (7 AM ET)
  pre-market-refresh:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install numpy
      - name: Fetch Statcast data
        run: python pipeline/fetch_statcast.py
      - name: Compute umpire framing composites
        run: python pipeline/fetch_umpire_framing.py
      - name: Compute 14-day weighted rolling stats
        run: python pipeline/compute_rolling_stats.py

  # -- Morning Pipeline: Schedule + Rosters (8 AM ET)
  fetch-games-players:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || true
      - name: Fetch & upsert games to Supabase
        run: python pipeline/fetch_games.py
      - name: Fetch & upsert players to Supabase (with handedness)
        run: python pipeline/fetch_players.py
      - name: Fetch confirmed lineups
        run: python pipeline/fetch_lineups.py
      - name: Fetch game weather
        run: python pipeline/fetch_weather.py
      - name: Fetch WBC games (sportId=51)
        run: python scripts/fetch_wbc_games.py

  # -- Late Morning Pipeline: Props + Projections (10:30 AM ET)
  morning-props-projections:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 14 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch confirmed lineups
        run: python pipeline/fetch_lineups.py
      - name: Fetch game weather
        run: python pipeline/fetch_weather.py
      - name: Fetch props
        run: python pipeline/fetch_props.py
      - name: Generate v2.0 pitcher projections
        run: python pipeline/generate_projections.py
      - name: Generate v2.0 batter projections
        run: python pipeline/generate_batter_projections.py
      - name: Generate daily content
        run: python scripts/generate_daily_content.py --format all --top 5

  # -- Afternoon Pipeline: Props Refresh + Update Projections (4:30 PM ET)
  afternoon-props-projections:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 20 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch confirmed lineups (refresh)
        run: python pipeline/fetch_lineups.py
      - name: Fetch game weather (refresh)
        run: python pipeline/fetch_weather.py
      - name: Fetch props
        run: python pipeline/fetch_props.py
      - name: Generate v2.0 pitcher projections
        run: python pipeline/generate_projections.py
      - name: Generate v2.0 batter projections
        run: python pipeline/generate_batter_projections.py
      - name: Generate daily content
        run: python scripts/generate_daily_content.py --format all --top 5

  # -- Overnight Pipeline: Grade Accuracy + CLV Tracking (2 AM ET)
  overnight-grading:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Grade accuracy
        run: python scripts/grade_accuracy.py
      - name: Track CLV
        run: python scripts/track_clv.py

  # -- Weekly Pipeline: Statcast Historical Refresh + Training Data (Sun 3 AM ET)
  weekly-statcast-historical:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 7 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch Statcast historical (current season, last 14 days)
        run: |
          END_DATE=$(date +%Y-%m-%d)
          START_DATE=$(date -d '14 days ago' +%Y-%m-%d)
          python pipeline/fetch_statcast_historical.py \
            --start-date "$START_DATE" \
            --end-date "$END_DATE" \
            --upload-supabase \
            --output statcast_rolling_14d.parquet
      - name: Backfill weather for past 7 days
        run: |
          python pipeline/fetch_weather.py \
            --date $(date +%Y-%m-%d) \
            --backfill-days 7 \
            --historical

  # -- Notify on failure --
  notify-on-failure:
    needs: [pre-market-refresh, fetch-games-players, morning-props-projections, afternoon-props-projections, overnight-grading, weekly-statcast-historical]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report pipeline failure
        run: |
          echo "::error::One or more BaselineMLB pipeline jobs failed."
          echo "Check the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Future: send Slack/Discord/email notification here
          # curl -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" \
          #   -d "{\"text\": \"BaselineMLB pipeline failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
